name: Compat Daily

# Runs install.sh end-to-end on every supported platform against the current
# latest Claude Code from npm. Catches the kind of regression we hit when
# Anthropic bumps the embedded Bun runtime ahead of Bun's stable release.

on:
  schedule:
    - cron: '17 7 * * *'   # ~07:17 UTC daily
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - install.sh
      - .github/workflows/compat-daily.yml
  pull_request:
    paths:
      - install.sh
      - .github/workflows/compat-daily.yml

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    # Single Linux runner — a Linux failure almost always means cross-platform
    # breakage upstream. macOS / Windows runners are 10x / 2x more expensive
    # than Linux on shared-tier accounting, so we don't burn them on a daily
    # signal.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update -qq && sudo apt-get install -y ripgrep
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install ripgrep
          fi
          rg --version | head -1

      - name: Install Bun (canary)
        # Anthropic ships claude-code with bleeding-edge Bun (e.g. 1.3.14
        # before it leaves the canary channel). Stable Bun panics with
        # "Expected CommonJS module to have a function wrapper" when loading
        # cli.original.cjs extracted from a newer-Bun-built native binary.
        shell: bash
        run: |
          curl -fsSL https://bun.sh/install | bash
          "$HOME/.bun/bin/bun" upgrade --canary
          echo "$HOME/.bun/bin"   >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Print runtime versions
        shell: bash
        run: |
          bun --version
          node --version
          uname -a

      - name: Run install.sh (npm-fallback path)
        # No official Claude binary pre-installed → install.sh exercises
        # its npm-registry fallback to fetch @anthropic-ai/claude-code-<plat>.
        # Capture output so the patch-result line can be asserted on; we
        # don't trust `patch.mjs --verify` because some patches have no
        # post-state sentinel (they use a regex-stale heuristic that
        # false-positives once the source survives a partial replacement).
        shell: bash
        run: |
          set -o pipefail
          bash install.sh 2>&1 | tee /tmp/install.log

      - name: Verify install artifacts
        shell: bash
        run: |
          ls -la "$HOME/.clawgod/" || true
          for f in cli.cjs cli.original.cjs patch.mjs extract-natives.mjs post-process.mjs .source-version; do
            test -e "$HOME/.clawgod/$f" || { echo "::error::missing ~/.clawgod/$f"; exit 1; }
          done
          echo "Source: $(cat "$HOME/.clawgod/.source-version")"

      - name: Assert all patches applied (parse install log)
        # patch.mjs prints "Result: A applied, S skipped, F failed".
        # F must be 0 — otherwise upstream has shifted enough that one of
        # our regex patches no longer matches and a feature is silently broken.
        shell: bash
        run: |
          line=$(grep -E 'Result: [0-9]+ applied, [0-9]+ skipped, [0-9]+ failed' /tmp/install.log | tail -1 || true)
          echo "Patch summary: ${line:-<not found>}"
          [[ -n "$line" ]] || { echo "::error::patch.mjs result line missing from install.sh output"; exit 1; }
          failed=$(echo "$line" | sed -E 's/.*skipped, ([0-9]+) failed.*/\1/')
          [[ "$failed" -eq 0 ]] || { echo "::error::patch.mjs reported $failed failed patches"; exit 1; }

      - name: Smoke test — claude --version
        # Exercises the wrapper path:
        #   launcher → bun cli.cjs → require('./cli.original.cjs')
        # The Bun CJS-wrapper panic surfaces here, not at install time.
        shell: bash
        run: |
          set +e
          out=$(claude --version 2>&1)
          rc=$?
          set -e
          echo "$out"
          if echo "$out" | grep -q "Expected CommonJS module to have a function wrapper"; then
            echo "::error::Bun CJS-wrapper panic — local Bun lags the embedded Bun"
            exit 1
          fi
          [[ $rc -eq 0 ]] || { echo "::error::claude --version exited $rc"; exit 1; }

      - name: Open / update issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const stamp = path.join(process.env.HOME, '.clawgod', '.source-version');
            const claudeVersion = fs.existsSync(stamp)
              ? fs.readFileSync(stamp, 'utf8').trim()
              : 'unknown';
            const title = `compat-daily: broke (claude ${claudeVersion})`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'compat-broken',
              per_page: 100,
            });
            const dup = open.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: `Re-failed ${new Date().toISOString().slice(0,10)} — ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['compat-broken', 'bug'],
                body: [
                  `Daily compatibility run failed on \`ubuntu-latest\`.`,
                  ``,
                  `- Claude binary: \`${claudeVersion}\``,
                  `- Run: ${runUrl}`,
                  ``,
                  `Auto-opened by \`.github/workflows/compat-daily.yml\`.`,
                ].join('\n'),
              });
            }
